<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Profile - NexAI</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><link rel="stylesheet" href="../assets/css/style.css"></head>
<body>
    <div class="app-layout">
        <app-sidebar active=""></app-sidebar>
        <main class="main-content">
            <app-header title="Profil Pengguna"></app-header>
            <div class="page-container">
                <div class="profile-header">
                    <img src="https://i.pravatar.cc/150?img=11" alt="Avatar" class="profile-avatar">
                    <div class="profile-info">
                        <h1>Developer Name</h1>
                        <p style="color:var(--text-muted)">developer@company.com</p>
                        <span class="profile-badge">PRO PLAN</span>
                    </div>
                </div>
                <button class="btn-primary" style="width:auto; padding:10px 24px;" onclick="window.location.href='login.html'">Keluar Akun</button>
            </div>
        </main>
    </div>
    <script src="../assets/js/components.js"></script><script src="../assets/js/app.js"></script>
</body>
</html>
