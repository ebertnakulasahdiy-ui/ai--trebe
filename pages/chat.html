<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - NexAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .chat-layout { display: flex; flex-direction: column; height: 100%; max-width: 850px; margin: 0 auto; width: 100%; position: relative; }
        .chat-area { flex: 1; overflow-y: auto; padding: 40px 24px; display: flex; flex-direction: column; gap: 32px; scroll-behavior: smooth; }
        
        .chat-empty-state { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: var(--text-muted); opacity: 0.6; pointer-events: none; }
        .chat-empty-state i { font-size: 40px; margin-bottom: 16px; color: var(--text-muted); }
        .chat-empty-state h2 { font-size: 20px; font-weight: 500; }

        .message { display: flex; gap: 20px; width: 100%; }
        .message.user { flex-direction: row-reverse; }
        
        .avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .avatar.ai { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .avatar.user { background: var(--bg-hover); color: var(--text-main); }
        
        .message-content-wrapper { flex: 1; max-width: 85%; }
        .message.user .message-content-wrapper { display: flex; justify-content: flex-end; }
        
        .message-content { font-size: 15px; line-height: 1.6; color: var(--text-main); }
        .message.user .message-content { background: var(--bg-hover); padding: 12px 16px; border-radius: 16px; border-top-right-radius: 4px; display: inline-block; }
        
        .input-area { padding: 0 24px 32px; background: transparent; flex-shrink: 0; }
        .input-box { display: flex; gap: 12px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 24px; padding: 10px 16px; align-items: flex-end; box-shadow: var(--shadow-soft); transition: var(--transition); }
        .input-box:focus-within { border-color: var(--border-focus); }
        
        .input-box textarea { flex: 1; background: transparent; border: none; color: var(--text-main); resize: none; max-height: 200px; outline: none; line-height: 1.5; padding: 8px 0; font-size: 15px; }
        .input-box textarea::placeholder { color: var(--text-muted); }
        
        .tool-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 8px; border-radius: 8px; transition: var(--transition); display: flex; align-items: center; justify-content: center; }
        .tool-btn:hover { color: var(--text-main); background: var(--bg-hover); }
        
        #sendBtn { background: var(--primary); color: var(--bg-main); width: 34px; height: 34px; border-radius: 50%; padding: 0; margin-bottom: 2px; }
        #sendBtn:hover { transform: scale(1.05); }
        #sendBtn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        
        .markdown-body pre { background: var(--bg-main); padding: 16px; border-radius: 12px; margin: 12px 0; overflow-x: auto; border: 1px solid var(--border); }
        .markdown-body code { font-family: var(--font-mono); font-size: 13px; }
        
        .message-actions { display: flex; gap: 4px; margin-top: 12px; }
        .message-actions .tool-btn { font-size: 13px; padding: 6px; }

        @media (max-width: 768px) {
            .chat-area { padding: 24px 16px; gap: 20px; }
            .message { gap: 12px; }
            .message-content-wrapper { max-width: 90%; }
            .avatar { width: 28px; height: 28px; font-size: 12px; }
            .message-content { font-size: 14px; }
            .chat-empty-state { top: 35%; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <app-sidebar active="chat"></app-sidebar>
        
        <main class="main-content">
            <app-header></app-header>
            
            <div class="chat-layout">
                
                <div class="chat-empty-state" id="emptyState">
                    <i class="fa-solid fa-layer-group"></i>
                    <h2>Apa yang bisa saya bantu?</h2>
                </div>

                <div class="chat-area" id="chatArea">
                    <!-- Dinamis terisi pesan -->
                </div>

                <div class="input-area">
                    <div class="input-box">
                        <button class="tool-btn" title="Upload File"><i class="fa-solid fa-paperclip"></i></button>
                        <button class="tool-btn hide-mobile" title="Web Search"><i class="fa-solid fa-globe"></i></button>
                        
                        <textarea rows="1" placeholder="Tanya sesuatu atau paste kode..." id="chatInput"></textarea>
                        
                        <button class="tool-btn" id="sendBtn" disabled><i class="fa-solid fa-arrow-up"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/chat.js"></script>
</body>
</html>
