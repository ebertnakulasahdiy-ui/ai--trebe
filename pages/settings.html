<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - NexAI Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="app-layout">
        <app-sidebar active="settings"></app-sidebar>
        
        <main class="main-content">
            <app-header title="Pengaturan"></app-header>
            
            <div class="page-container">
                <h1>Pengaturan Sistem</h1>
                <p style="color:var(--text-muted); margin-bottom:32px;">Sesuaikan pengalaman Workspace Anda.</p>

                <div class="settings-layout">
                    <div class="settings-nav">
                        <a href="#" class="active">Umum</a>
                        <a href="#">Model AI & API</a>
                        <a href="#">Memori & Konteks</a>
                        <a href="#">Shortcut</a>
                    </div>
                    <div class="settings-content">
                        <div class="settings-section">
                            <h3>Preferensi Tema</h3>
                            <div class="form-group">
                                <label>Tema Tampilan</label>
                                <select class="form-control">
                                    <option>System Default</option>
                                    <option>Dark Mode (Linear Style)</option>
                                    <option>Light Mode</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Bahasa AI Default</label>
                                <select class="form-control">
                                    <option>Bahasa Indonesia</option>
                                    <option>English (US)</option>
                                </select>
                            </div>
                        </div>

                        <div class="settings-section">
                            <h3>Model AI Utama</h3>
                            <div class="form-group">
                                <label>Pilih Model Core</label>
                                <select class="form-control">
                                    <option>GPT-4o (OpenAI)</option>
                                    <option>Claude 3.5 Sonnet (Anthropic)</option>
                                    <option selected>Gemini 1.5 Pro (Google)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Custom API Key (Optional)</label>
                                <input type="password" class="form-control" placeholder="sk-...">
                            </div>
                        </div>
                        
                        <button class="btn-primary" style="width:auto; padding:10px 24px;">Simpan Perubahan</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/app.js"></script>
</body>
</html>
