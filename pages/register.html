<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - NexAI Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Daftar ke NexAI</h1>
                <p>Mulai pengalaman AI Workspace terbaik</p>
            </div>
            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label>Nama Lengkap</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="nama@perusahaan.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="Minimal 8 karakter" required>
                </div>
                <div class="form-group">
                    <label>Konfirmasi Password</label>
                    <input type="password" class="form-control" placeholder="Ulangi password" required>
                </div>
                <button type="submit" class="btn-primary">Buat Akun</button>
            </form>
            <div class="auth-footer">
                Sudah punya akun? <a href="login.html">Masuk</a>
            </div>
        </div>
    </div>
    <script src="../assets/js/app.js"></script>
</body>
</html>
